<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minu Sudoku</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            max-width: 400px; 
            margin: 20px auto; 
            border: 2px solid #333; 
        }
        input { 
            width: 100%; 
            height: 45px; 
            text-align: center; 
            font-size: 1.2rem; 
            border: 0.5px solid #ccc; 
            box-sizing: border-box;
            outline: none;
        }
        input:nth-child(3n) { border-right: 2px solid #333; }
        input:nth-child(n+19):nth-child(-n+27),
        input:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #333; }
        button { padding: 10px 20px; margin-top: 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Sudoku</h1>
    <div id="grid"></div>
    <button onclick="checkSolution()">Kontrolli lahendust</button>

    <script>
        const board = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];

        const gridEl = document.getElementById('grid');
        board.flat().forEach((val, i) => {
            const input = document.createElement('input');
            input.type = 'number';
            input.min = 1;
            input.max = 9;
            if (val !== 0) {
                input.value = val;
                input.readOnly = true;
                input.style.background = '#eee';
            }
            gridEl.appendChild(input);
        });

        function checkSolution() {
            alert("Tubli algus! See on lihtne versioon. Genereerimise ja kontrolli loogikat saab edasi arendada.");
        }
    </script>
</body>
</html>
