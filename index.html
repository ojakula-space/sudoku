                    <!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinu Sudoku</title>
    <style>
        :root { --main-color: #3498db; --bg-color: #f0f2f5; --border: #34495e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 450px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; color: var(--border); }
        #grid { display: grid; grid-template-columns: repeat(9, 1fr); border: 3px solid var(--border); margin-bottom: 20px; background: var(--border); gap: 1px; }
        input { 
            width: 100%; aspect-ratio: 1/1; text-align: center; font-size: 1.4rem; border: none; outline: none; 
            background: white; -webkit-appearance: none; border-radius: 0; padding: 0;
        }
        /* 3x3 sektsioonide eraldamine paksema joonega */
        input:nth-child(3n) { border-right: 2px solid var(--border); }
        input:nth-child(9n) { border-right: none; }
        input:nth-child(n+19):nth-child(-n+27), input:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--border); }
        
        .fixed { background: #f8f9fa; color: #7f8c8d; font-weight: bold; }
        .wrong { color: #e74c3c; background: #fff5f5; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        button { 
            flex: 1; padding: 15px; font-size: 1rem; font-weight: bold; border: none; 
            border-radius: 8px; cursor: pointer; color: white; transition: opacity 0.2s;
        }
        .btn-new { background: var(--main-color); }
        .btn-check { background: #2ecc71; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Sudoku</h1>
        <div id="grid"></div>
        <div class="controls">
            <button class="btn-new" onclick="initGame()">Uus mäng</button>
            <button class="btn-check" onclick="checkWin()">Kontrolli</button>
        </div>
    </div>

    <script>
        let solution = [];
        const gridEl = document.getElementById('grid');

        function generateBoard() {
            let board = Array(9).fill().map(() => Array(9).fill(0));
            // Täidame diagonaalsed 3x3 kastid (need on üksteisest sõltumatud)
            for (let i = 0; i < 9; i += 3) fillBox(board, i, i);
            solve(board);
            return board;
        }

        function fillBox(board, row, col) {
            let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    board[row + i][col + j] = nums.pop();
                }
            }
        }

        function solve(board) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                        for (let n of nums) {
                            if (isValid(board, r, c, n)) {
                                board[r][c] = n;
                                if (solve(board)) return true;
                                board[r][c] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function isValid(board, r, c, n) {
            for (let i = 0; i < 9; i++) {
                if (board[r][i] === n || board[i][c] === n || 
                    board[3 * Math.floor(r / 3) + Math.floor(i / 3)][3 * Math.floor(c / 3) + i % 3] === n) return false;
            }
            return true;
        }

        function initGame() {
            gridEl.innerHTML = '';
            solution = generateBoard();
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.pattern = "[1-9]*";
                    input.inputMode = "numeric";
                    if (Math.random() < 0.5) { // Peidame umbes poole numbritest
                        input.value = solution[r][c];
                        input.readOnly = true;
                        input.classList.add('fixed');
                    }
                    input.dataset.r = r;
                    input.dataset.c = c;
                    input.oninput = function() { this.classList.remove('wrong'); };
                    gridEl.appendChild(input);
                }
            }
        }

        function checkWin() {
            const inputs = document.querySelectorAll('#grid input');
            let win = true;
            inputs.forEach(i => {
                if (parseInt(i.value) !== solution[i.dataset.r][i.dataset.c]) {
                    if (!i.readOnly) i.classList.add('wrong');
                    win = false;
                }
            });
            if (win) alert("Suurepärane! Kõik on õige!");
            else alert("Viga kuskil sees! Punased ruudud on valed.");
        }

        initGame();
    </script>
</body>
</html>
