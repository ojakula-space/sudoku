 <!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minu Nutikas Sudoku</title>
    <style>
        :root { --border: #333; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; }
        h1 { color: #2c3e50; }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            max-width: 450px; 
            margin: 20px auto; 
            border: 3px solid var(--border);
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        input { 
            width: 100%; 
            aspect-ratio: 1 / 1;
            text-align: center; 
            font-size: 1.5rem; 
            border: 0.5px solid #ddd; 
            box-sizing: border-box;
            outline: none;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        /* Paksemad piirid 3x3 kasti jaoks */
        input:nth-child(3n) { border-right: 3px solid var(--border); }
        input:nth-child(9n) { border-right: 0.5px solid #ddd; }
        input:nth-child(n+19):nth-child(-n+27),
        input:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid var(--border); }
        
        .fixed { background: #e9ecef; font-weight: bold; color: #495057; }
        .wrong { color: #e74c3c; background: #fceae9; }
        button { 
            padding: 12px 30px; 
            font-size: 1.1rem;
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            background: #27ae60; 
            color: white; 
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Sudoku</h1>
    <div id="grid"></div>
    <button onclick="checkGame()">Kontrolli tulemust</button>

    <script>
        const solution = [
            [5,3,4,6,7,8,9,1,2], [6,7,2,1,9,5,3,4,8], [1,9,8,3,4,2,5,6,7],
            [8,5,9,7,6,1,4,2,3], [4,2,6,8,5,3,7,9,1], [7,1,3,9,2,4,8,5,6],
            [9,6,1,5,3,7,2,8,4], [2,8,7,4,1,9,6,3,5], [3,4,5,2,8,6,1,7,9]
        ];
        const initial = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];

        const gridEl = document.getElementById('grid');
        const inputs = [];

        for(let r=0; r<9; r++) {
            for(let c=0; c<9; c++) {
                const input = document.createElement('input');
                input.type = 'number';
                if (initial[r][c] !== 0) {
                    input.value = initial[r][c];
                    input.readOnly = true;
                    input.classList.add('fixed');
                }
                gridEl.appendChild(input);
                inputs.push({el: input, r, c});
            }
        }

        function checkGame() {
            let win = true;
            inputs.forEach(item => {
                const val = parseInt(item.el.value);
                if (val !== solution[item.r][item.c]) {
                    if (!item.el.readOnly) item.el.classList.add('wrong');
                    win = false;
                } else {
                    item.el.classList.remove('wrong');
                }
            });
            if (win) alert("VÕIT! Sa lahendasid selle Sudoku ära!");
            else alert("Viga! Mõned numbrid on valed või puudu.");
        }
    </script>
</body>
</html>
